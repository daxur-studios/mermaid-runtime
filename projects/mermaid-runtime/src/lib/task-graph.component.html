<mr-graph-canvas
  #canvas
  [nodes]="nodes()"
  [transitions]="transitions()"
  [groups]="groups()"
  [selectedNodeId]="selectedNodeId()"
  [currentNodeId]="currentNodeId()"
  [replayActive]="replayActive()"
  [replayEvent]="replayEvent()"
  [decorations]="decorations()"
  [statusStyles]="statusStyles()"
  [mermaidTheme]="mermaidTheme()"
  [mermaidConfig]="mermaidConfig()"
  [backgroundEffect]="backgroundEffect()"
  [(direction)]="direction"
  [rootLabel]="rootLabel()"
  [showBreadcrumb]="showBreadcrumb()"
  [breadcrumbPlacement]="breadcrumbPlacement()"
  [showSubgraphPreview]="showSubgraphPreview()"
  [showMinimap]="showMinimap()"
  [minimapPlacement]="minimapPlacement()"
  [cameraControlsPlacement]="cameraControlsPlacement()"
  [subgraphResolver]="subgraphResolver()"
  [path]="path()"
  [followExecution]="followExecution()"
  [showDetail]="showInspector() && inspectorPlacement() === 'built-in'"
  (nodeSelected)="nodeSelected.emit($event)"
  (nodeContextMenu)="nodeContextMenu.emit($event)"
  (subgraphEntered)="subgraphEntered.emit($event)"
  (subgraphLeft)="subgraphLeft.emit($event)"
  (graphPathChange)="graphPathChange.emit($event)"
>
  <!-- Host-supplied viewport overlays (extra controls, minimap, legends).
       ngProjectAs is required here: a nested <ng-content> does not itself carry the `overlay`
       attribute, so without it mr-graph-canvas's own `[overlay]` slot would not match this
       forwarded content and it would be silently dropped. -->
  <ng-content select="[overlay]" ngProjectAs="[overlay]"></ng-content>

  @if (showInspector() && inspectorPlacement() === 'built-in') {
    <mr-graph-inspector
      detail
      [node]="canvas.selectedNode()"
      [runId]="runId()"
      [hasSubgraph]="canvas.selectedNodeHasSubgraph()"
      (enterSubgraph)="canvas.enterSelectedSubgraph()"
    />
  }
</mr-graph-canvas>
