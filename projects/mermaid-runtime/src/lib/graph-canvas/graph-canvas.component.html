<div class="graph-canvas__layout" [class.graph-canvas__layout--with-detail]="showDetail()">
  <div
    class="graph-canvas__viewport"
    #viewport
    [style.--zoom-scale]="cameraState().scale"
    [style.--pan-x.px]="cameraState().x"
    [style.--pan-y.px]="cameraState().y"
    [style.--small-dot-opacity]="smallDotOpacity()"
    [style.--large-grid-opacity]="largeGridOpacity()"
  >
    <mr-graph-camera
      class="graph-canvas__camera"
      (userInteract)="onUserInteract()"
    >
      <markdown
        [data]="flowMarkdown()"
        mermaid
        [mermaidOptions]="mermaidOptions"
        class="graph-canvas__mermaid"
      ></markdown>
    </mr-graph-camera>

    @if (showRecenterChip()) {
      <button type="button" class="graph-canvas__recenter" (click)="resumeFollow()">
        Re-center on running
      </button>
    }

    @if (showBreadcrumb() && breadcrumb().length > 0) {
      <nav class="graph-canvas__breadcrumb" aria-label="Subgraph path">
        @for (crumb of breadcrumb(); track crumb.depth; let last = $last) {
          <button
            type="button"
            class="graph-canvas__crumb"
            [class.graph-canvas__crumb--current]="last"
            [disabled]="last"
            (click)="goToDepth(crumb.depth)"
          >
            {{ crumb.label }}
          </button>
          @if (!last) {
            <span class="graph-canvas__crumb-sep" aria-hidden="true">›</span>
          }
        }
      </nav>
    }

    <!-- Host-supplied viewport overlays (extra controls, minimap, legends). -->
    <ng-content select="[overlay]"></ng-content>

    @if (showMinimap() && minimapPlacement() === 'built-in') {
      <mr-minimap
        [contentRect]="minimapContentRect()"
        [viewportRect]="minimapViewportRect()"
        [nodes]="minimapNodes()"
        (jump)="centerOnPoint($event)"
      />
    }
  </div>

  <!-- Host-supplied side detail (inspector/sidebar); reserved only when showDetail. -->
  <ng-content select="[detail]"></ng-content>
</div>
